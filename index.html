<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP WhiteBoard — 競程白板</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='4' width='28' height='24' rx='3' fill='%231e1e1e' stroke='%23e0e0e0' stroke-width='2'/%3E%3Ctext x='16' y='20' text-anchor='middle' fill='%2356b3e6' font-family='Consolas,monospace' font-size='14' font-weight='bold'%3ECP%3C/text%3E%3Cline x1='6' y1='26' x2='26' y2='26' stroke='%23888' stroke-width='1.5'/%3E%3Crect x='12' y='26' width='8' height='2' rx='1' fill='%23888'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Roboto:wght@300;400&family=Fira+Code:wght@300;400&family=JetBrains+Mono:wght@300;400&family=Space+Mono&display=swap">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">CP</div>
            <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
            <div class="loading-text" id="loading-text">載入中…</div>
        </div>
    </div>

    <!-- Main Canvas -->
    <canvas id="main-canvas"></canvas>
    <!-- Text editing overlay -->
    <textarea id="text-edit-overlay"></textarea>

    <!-- Top Bar (actions) -->
    <div id="top-bar">
        <button class="top-bar-btn" id="btn-undo" data-tooltip="復原 (Ctrl+Z)">
            <span class="material-symbols-outlined">undo</span>
        </button>
        <button class="top-bar-btn" id="btn-redo" data-tooltip="重做 (Ctrl+Shift+Z)">
            <span class="material-symbols-outlined">redo</span>
        </button>
        <span style="width:1px;height:20px;background:var(--border-color)"></span>
        <button class="top-bar-btn" id="btn-export-json" data-tooltip="匯出 JSON">
            <span class="material-symbols-outlined">download</span>
        </button>
        <button class="top-bar-btn" id="btn-import-json" data-tooltip="匯入 JSON">
            <span class="material-symbols-outlined">upload</span>
        </button>
        <button class="top-bar-btn" id="btn-export-png" data-tooltip="匯出 PNG">
            <span class="material-symbols-outlined">image</span>
        </button>
    </div>

    <!-- Left Toolbar -->
    <div id="toolbar">
        <button class="toolbar-btn active" data-tool="select" data-tooltip="選取 (V)">
            <span class="material-symbols-outlined">near_me</span>
        </button>
        <button class="toolbar-btn" data-tool="pan" data-tooltip="平移 (H)">
            <span class="material-symbols-outlined">pan_tool</span>
        </button>
        <div class="toolbar-separator"></div>
        <button class="toolbar-btn" data-tool="rectangle" data-tooltip="矩形 (R)">
            <span class="material-symbols-outlined">rectangle</span>
        </button>
        <button class="toolbar-btn" data-tool="circle" data-tooltip="圓形 (C)">
            <span class="material-symbols-outlined">circle</span>
        </button>
        <button class="toolbar-btn" data-tool="line" data-tooltip="線段 (L)">
            <span class="material-symbols-outlined">show_chart</span>
        </button>
        <button class="toolbar-btn" data-tool="arrow" data-tooltip="箭頭 (A)">
            <span class="material-symbols-outlined">trending_flat</span>
        </button>
        <button class="toolbar-btn" data-tool="text" data-tooltip="文字 (T)">
            <span class="material-symbols-outlined">title</span>
        </button>
        <div class="toolbar-separator"></div>
        <button class="toolbar-btn" data-tool="matrix" data-tooltip="矩陣">
            <span class="material-symbols-outlined">grid_on</span>
        </button>
        <button class="toolbar-btn" data-tool="stack" data-tooltip="堆疊">
            <span class="material-symbols-outlined">layers</span>
        </button>
        <button class="toolbar-btn" data-tool="queue" data-tooltip="佇列">
            <span class="material-symbols-outlined">queue</span>
        </button>
        <div class="toolbar-separator"></div>
        <button class="toolbar-btn" data-tool="tree" data-tooltip="樹">
            <span class="material-symbols-outlined">account_tree</span>
        </button>
        <button class="toolbar-btn" data-tool="graph" data-tooltip="圖論">
            <span class="material-symbols-outlined">hub</span>
        </button>
    </div>

    <!-- Property Panel (right) -->
    <div id="property-panel">
        <div class="panel-section">
            <div class="panel-section-title">位置 & 大小</div>
            <div class="panel-row">
                <div class="num-field">
                    <span class="num-label">X</span>
                    <input type="number" id="prop-x">
                    <div class="num-spinners">
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepUp();i.dispatchEvent(new Event('input'))">&#9652;</button>
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepDown();i.dispatchEvent(new Event('input'))">&#9662;</button>
                    </div>
                </div>
                <div class="num-field">
                    <span class="num-label">Y</span>
                    <input type="number" id="prop-y">
                    <div class="num-spinners">
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepUp();i.dispatchEvent(new Event('input'))">&#9652;</button>
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepDown();i.dispatchEvent(new Event('input'))">&#9662;</button>
                    </div>
                </div>
            </div>
            <div class="panel-row">
                <div class="num-field">
                    <span class="num-label">W</span>
                    <input type="number" id="prop-w" min="1">
                    <div class="num-spinners">
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepUp();i.dispatchEvent(new Event('input'))">&#9652;</button>
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepDown();i.dispatchEvent(new Event('input'))">&#9662;</button>
                    </div>
                </div>
                <div class="num-field">
                    <span class="num-label">H</span>
                    <input type="number" id="prop-h" min="1">
                    <div class="num-spinners">
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepUp();i.dispatchEvent(new Event('input'))">&#9652;</button>
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepDown();i.dispatchEvent(new Event('input'))">&#9662;</button>
                    </div>
                </div>
            </div>
            <div class="panel-row">
                <div class="num-field">
                    <span class="num-label">∠</span>
                    <input type="number" id="prop-rot" min="-360" max="360" step="1">
                    <span class="num-suffix">°</span>
                    <div class="num-spinners">
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepUp();i.dispatchEvent(new Event('input'))">&#9652;</button>
                        <button onclick="const i=this.closest('.num-field').querySelector('input');i.stepDown();i.dispatchEvent(new Event('input'))">&#9662;</button>
                    </div>
                </div>
            </div>
            <div class="panel-row" id="cell-size-row" style="display:none">
                <label>格大小</label>
                <input type="range" id="prop-cell-size" min="24" max="80" value="42">
                <span class="range-value" id="prop-cell-size-val">42</span>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">色彩</div>
            <div class="color-grid" id="color-grid"></div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">樣式</div>
            <div class="panel-row" id="draw-style-row" style="display:none">
                <label>填充</label>
                <select id="prop-draw-style">
                    <option value="stroke">空心</option>
                    <option value="fill">實心</option>
                    <option value="dashed">虛線</option>
                </select>
            </div>
            <div class="panel-row">
                <label>透明度</label>
                <input type="range" id="prop-opacity" min="0" max="100" value="100">
                <span class="range-value" id="prop-opacity-val">100%</span>
            </div>
            <div class="panel-row">
                <label>飽和度</label>
                <input type="range" id="prop-saturation" min="0" max="100" value="100">
                <span class="range-value" id="prop-saturation-val">100%</span>
            </div>
            <div class="panel-row">
                <label>線寬</label>
                <input type="range" id="prop-stroke-width" min="1" max="10" value="2">
                <span class="range-value" id="prop-stroke-width-val">2</span>
            </div>
            <div class="panel-row" id="font-family-row" style="display:none">
                <label>字體</label>
                <select id="prop-font-family" style="flex:1;font-size:11px;background:var(--bg-surface);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:2px 4px">
                    <option value="Inter, sans-serif">Inter</option>
                    <option value="Roboto, sans-serif">Roboto</option>
                    <option value="JetBrains Mono, monospace">JetBrains Mono</option>
                    <option value="Fira Code, monospace">Fira Code</option>
                    <option value="Space Mono, monospace">Space Mono</option>
                    <option value="Consolas, monospace">Consolas</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Layer Panel (bottom-right) -->
    <div id="layer-panel" style="display:none">
        <div class="layer-panel-header">
            <span>圖層</span>
            <div style="display:flex;gap:2px">
                <button id="layer-up" title="上移"><span class="material-symbols-outlined">keyboard_arrow_up</span></button>
                <button id="layer-down" title="下移"><span class="material-symbols-outlined">keyboard_arrow_down</span></button>
            </div>
        </div>
        <div class="layer-list" id="layer-list"></div>
    </div>

    <!-- Hidden file input for JSON import -->
    <input type="file" id="json-file-input" accept=".json" style="display:none">

    <!-- Bottom Zoom Bar -->
    <div id="zoom-bar">
        <button class="zoom-bar-btn" id="btn-zoom-out" data-tooltip="縮小 (Ctrl+-)">
            <span class="material-symbols-outlined">remove</span>
        </button>
        <span class="zoom-display" id="zoom-display" data-tooltip="點擊重置縮放">100%</span>
        <button class="zoom-bar-btn" id="btn-zoom-in" data-tooltip="放大 (Ctrl+=)">
            <span class="material-symbols-outlined">add</span>
        </button>
    </div>

    <!-- Right-click Context Menu -->
    <div id="context-menu">
        <div class="ctx-item" id="ctx-rename"><span class="material-symbols-outlined">edit</span> 重新命名</div>
        <div class="ctx-item" id="ctx-duplicate"><span class="material-symbols-outlined">content_copy</span> 複製</div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" id="ctx-layer-up"><span class="material-symbols-outlined">keyboard_arrow_up</span> 上移一層</div>
        <div class="ctx-item" id="ctx-layer-down"><span class="material-symbols-outlined">keyboard_arrow_down</span> 下移一層</div>
        <div class="ctx-separator" id="ctx-sep1"></div>
        <div class="ctx-item" id="ctx-bring-front"><span class="material-symbols-outlined">flip_to_front</span> 移至最上層</div>
        <div class="ctx-item" id="ctx-send-back"><span class="material-symbols-outlined">flip_to_back</span> 移至最下層</div>
        <div class="ctx-separator" id="ctx-sep2"></div>
        <div class="ctx-item ctx-danger" id="ctx-delete"><span class="material-symbols-outlined">delete</span> 刪除</div>
    </div>

    <!-- Inline Rename Input -->
    <input type="text" id="rename-input" autocomplete="off">

    <!-- Loading Screen Controller -->
    <script>
    (function() {
        const screen  = document.getElementById('loading-screen');
        const fill    = document.getElementById('loading-fill');
        const text    = document.getElementById('loading-text');
        let progress  = 0;
        let appReady  = false;
        let fontsReady = false;

        function setProgress(p, msg) {
            progress = Math.min(100, Math.max(progress, p));
            if (fill) fill.style.width = progress + '%';
            if (msg && text) text.textContent = msg;
        }

        function tryDismiss() {
            if (!appReady || !fontsReady) return;
            setProgress(100, '就緒');
            setTimeout(() => {
                if (screen) {
                    screen.classList.add('fade-out');
                    setTimeout(() => screen.remove(), 450);
                }
            }, 200);
        }

        // Step 1: Wait for Material Symbols font
        setProgress(10, '載入圖示字型…');
        const ICON_FONT = 'Material Symbols Outlined';
        const iconCheck = new FontFace(ICON_FONT, 'local("Material Symbols Outlined")');

        const fontTimeout = setTimeout(() => {
            // Font CDN may be slow — proceed anyway
            fontsReady = true;
            setProgress(60, '字型載入逾時，繼續…');
            tryDismiss();
        }, 5000);

        document.fonts.ready.then(() => {
            clearTimeout(fontTimeout);
            const loaded = [...document.fonts].some(f => f.family.includes('Material Symbols'));
            if (loaded) {
                setProgress(60, '圖示字型就緒');
            } else {
                setProgress(60, '圖示字型未找到');
            }
            fontsReady = true;
            tryDismiss();
        }).catch(() => {
            clearTimeout(fontTimeout);
            fontsReady = true;
            setProgress(60, '字型載入失敗');
            tryDismiss();
        });

        // Step 2: Load app module
        setProgress(20, '載入應用程式…');
        const script = document.createElement('script');
        script.type = 'module';
        script.src  = 'js/app.js';
        script.onload = () => {
            setProgress(90, '初始化…');
            appReady = true;
            tryDismiss();
        };
        script.onerror = () => {
            setProgress(100, '⚠ 載入失敗');
            if (text) text.style.color = '#e06c75';
            appReady = true;
            tryDismiss();
        };
        document.body.appendChild(script);
    })();
    </script>
</body>
</html>
